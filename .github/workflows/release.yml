name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-X github.com/AhmedAburady/banana-cli/cli.version=$VERSION"

          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o banana-linux-amd64 ./cmd/banana
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o banana-linux-arm64 ./cmd/banana

          # macOS
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o banana-darwin-amd64 ./cmd/banana
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o banana-darwin-arm64 ./cmd/banana

          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o banana-windows-amd64.exe ./cmd/banana
          GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o banana-windows-arm64.exe ./cmd/banana

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            banana-linux-amd64
            banana-linux-arm64
            banana-darwin-amd64
            banana-darwin-arm64
            banana-windows-amd64.exe
            banana-windows-arm64.exe
          generate_release_notes: true
