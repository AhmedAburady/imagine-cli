name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-X main.version=$VERSION"

          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o imagine-linux-amd64 ./cmd/imagine
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o imagine-linux-arm64 ./cmd/imagine

          # macOS
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o imagine-darwin-amd64 ./cmd/imagine
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o imagine-darwin-arm64 ./cmd/imagine

          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o imagine-windows-amd64.exe ./cmd/imagine
          GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o imagine-windows-arm64.exe ./cmd/imagine

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            imagine-linux-amd64
            imagine-linux-arm64
            imagine-darwin-amd64
            imagine-darwin-arm64
            imagine-windows-amd64.exe
            imagine-windows-arm64.exe
          generate_release_notes: true
