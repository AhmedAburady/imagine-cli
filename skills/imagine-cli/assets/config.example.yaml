# imagine configuration template
#
# Save as ~/.config/imagine/config.yaml (on Linux/macOS/BSD)
#         %AppData%\imagine\config.yaml (on Windows)
#
# Prefer using `imagine providers add <name>` to build this file
# interactively — it preserves comments and handles field validation.
# This template is for users who want to hand-author it instead.
#
# Include ONLY the providers you actually use. Delete the others.
#
# Pick a default_provider when you have multiple configured — otherwise
# imagine picks the alphabetically-first one, which may surprise you.
# You can also set/change the default later with:
#   imagine providers use <name>
#   imagine providers select   (interactive picker)

default_provider: gemini    # one of: gemini, vertex, openai

providers:

  # Gemini (direct REST, API key auth)
  # Get a free key at https://aistudio.google.com/app/apikey
  # Or: imagine providers add gemini --api-key AIza-...
  gemini:
    api_key: AIza-paste-your-gemini-key-here

  # OpenAI (GPT Image models)
  # Get a key at https://platform.openai.com
  # Note: requires org verification for GPT Image access
  # Or: imagine providers add openai --api-key sk-...
  openai:
    api_key: sk-paste-your-openai-key-here

  # Vertex AI (Gemini via GCP, ADC auth)
  # Setup on this machine:
  #   1. A GCP project with the Vertex AI API enabled
  #   2. Run: gcloud auth application-default login
  # No API key needed — ADC handles auth.
  # Or: imagine providers add vertex --gcp-project <id> --location <region>
  vertex:
    gcp_project: your-gcp-project-id
    location: global        # optional — "global" is the default
